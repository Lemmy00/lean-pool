name: PR Separation Guard

# PRs must not mix pooled formalization content with repository infrastructure.
# Content files are:
#   - LeanPool.lean
#   - LeanPool/**/*.lean
#   - LeanPool/projects.yml
# A PR may touch only content files, or only non-content files (.github/,
# python/, scripts/, docs, lakefile.toml, lean-toolchain, etc.). Mixing both
# categories fails this gate.
#
# Version-bump exemption: a Lean/Mathlib bump is inherently both content
# (LeanPool/**/*.lean API repairs) and infra (toolchain + manifest), and
# neither half builds without the other, so it cannot satisfy the split. A PR
# may therefore carry content alongside ONLY these bump files:
#   - lean-toolchain
#   - lake-manifest.json
#   - lakefile.toml
# Any other non-content file alongside content still fails the gate.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to guard (re-triggers the gate without a push)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  # On a workflow_dispatch the pull_request context is empty, so fall back to
  # the input PR number; otherwise group by the live PR number as before.
  group: >-
    content-pr-guard-${{ github.event.pull_request.number ||
      inputs.pr_number }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    name: Content / non-content separation
    steps:
      - name: Reject mixed content and non-content changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          files="$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')"
          echo "Files changed in this PR:"
          printf '%s\n' "$files" | sed 's/^/  /'
          echo

          # Content: the mk_all index, any .lean under LeanPool/, projects.yml.
          content_re='^(LeanPool\.lean|LeanPool/.+\.lean|LeanPool/projects\.yml)$'
          content="$(printf '%s\n' "$files" | { grep -E "$content_re" || true; })"
          non_content="$(printf '%s\n' "$files" | { grep -vE "$content_re" || true; })"

          # Bump allowlist: non-content files permitted to ride along with
          # content in a version-bump PR (see header comment).
          bump_re='^(lean-toolchain|lake-manifest\.json|lakefile\.toml)$'
          disallowed_non_content="$(printf '%s\n' "$non_content" | { grep -vE "$bump_re" || true; })"

          if [ -n "$content" ] && [ -n "$disallowed_non_content" ]; then
            echo "::error::This PR mixes content and non-content changes."
            echo "Content files may be changed only in content-only PRs:"
            echo "  - LeanPool.lean"
            echo "  - LeanPool/**/*.lean"
            echo "  - LeanPool/projects.yml"
            echo "(Exception: a version bump may also touch lean-toolchain,"
            echo " lake-manifest.json, and lakefile.toml.)"
            echo
            echo "Content files in this PR:"
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              echo "  - $f"
            done <<< "$content"
            echo
            echo "Non-content files in this PR:"
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              echo "  - $f"
              echo "::error file=$f::mixed with LeanPool content; split content and non-content changes into separate PRs"
            done <<< "$disallowed_non_content"
            exit 1
          fi
          if [ -n "$content" ] && [ -n "$non_content" ]; then
            echo "✓ Version-bump PR: content alongside toolchain/manifest only."
          elif [ -n "$content" ]; then
            echo "✓ Content-only PR."
          else
            echo "✓ Non-content-only PR."
          fi
