name: LLM Review

# Triggers: successful Lean Action CI completion, /review issue comment,
# workflow_dispatch. PRs with no .lean files skip immediately. Otherwise
# call gpt-5.5 only when Lean Action CI is green for the reviewed head SHA.
on:
  workflow_run:
    workflows: ["Lean Action CI"]
    types: [completed]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  # Needed to query Lean Action CI run status for the head SHA.
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Automatic reviews run after successful Lean Action CI runs associated
    # with a PR. Manual review requests check CI immediately and do not poll.
    # startsWith catches "/review" and "/review please ..." but not casual
    # mentions like "should we /review this?".
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.pull_requests[0] != null) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/review'))
    steps:
      - name: Resolve PR number and head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          PR_FROM_COMMENT: ${{ github.event.issue.number }}
          PR_FROM_WORKFLOW_RUN: ${{ github.event.workflow_run.pull_requests[0].number }}
          SHA_FROM_WORKFLOW_RUN: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION_FROM_WORKFLOW_RUN: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          head_sha=""
          lean_ci_conclusion=""
          case "$EVENT_NAME" in
            workflow_dispatch)   pr="$DISPATCH_PR" ;;
            issue_comment)       pr="$PR_FROM_COMMENT" ;;
            workflow_run)
              pr="$PR_FROM_WORKFLOW_RUN"
              head_sha="$SHA_FROM_WORKFLOW_RUN"
              lean_ci_conclusion="$CONCLUSION_FROM_WORKFLOW_RUN"
              ;;
            *) echo "::error::Unexpected event $EVENT_NAME"; exit 1 ;;
          esac
          if [ -z "$pr" ]; then
            echo "::error::Could not resolve PR number"; exit 1
          fi
          if [ -z "$head_sha" ]; then
            head_sha=$(gh api "repos/$REPO/pulls/$pr" --jq '.head.sha')
          fi
          {
            echo "number=$pr"
            echo "head_sha=$head_sha"
            echo "lean_ci_conclusion=$lean_ci_conclusion"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$pr at $head_sha"

      - name: Check whether the PR touches any .lean files
        id: lean_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          # `gh api --paginate` runs `--jq` once per page and concatenates
          # outputs with newlines, so an aggregating filter like `length`
          # emits one number per page (breaks once a PR exceeds 100 files).
          # Emit one line per matching filename and count with `wc -l`.
          count=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate \
                    --jq '.[] | select(.filename | endswith(".lean")) | .filename' \
                  | wc -l | tr -d '[:space:]')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "PR #$PR_NUMBER touches no .lean files; skipping gpt-5.5 review."
          else
            echo "PR #$PR_NUMBER touches $count .lean file(s); checking Lean Action CI."
          fi

      - name: Comment when no .lean files in PR
        if: steps.lean_changes.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "_LLM review skipped: PR touches no \`.lean\` files. Push a Lean change or comment \`/review\` after one lands to re-trigger._"

      - name: Check Lean Action CI on this head
        id: ci
        if: steps.lean_changes.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          INITIAL_CONCLUSION: ${{ steps.pr.outputs.lean_ci_conclusion }}
        run: |
          set -euo pipefail
          if [ -n "$INITIAL_CONCLUSION" ]; then
            conclusion="$INITIAL_CONCLUSION"
          else
            run_json=$(gh api \
              "repos/$REPO/actions/workflows/lean_action_ci.yml/runs?head_sha=$HEAD_SHA&per_page=1" \
              --jq '.workflow_runs[0] // empty')
            if [ -n "$run_json" ]; then
              status=$(echo "$run_json" | jq -r '.status')
              if [ "$status" = "completed" ]; then
                conclusion=$(echo "$run_json" | jq -r '.conclusion // ""')
              else
                conclusion="$status"
              fi
            else
              conclusion="missing"
            fi
          fi
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
          echo "Lean Action CI conclusion: $conclusion"

      - name: Comment when Lean CI is not green
        if: >-
          steps.lean_changes.outputs.count != '0' &&
          steps.ci.outputs.conclusion != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CONCLUSION: ${{ steps.ci.outputs.conclusion }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "_LLM review skipped: Lean Action CI conclusion was \`$CONCLUSION\`. Push a fix or comment \`/review\` after CI is green._"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.ci.outputs.conclusion == 'success'
        with:
          # Always check out the base branch (default), never the PR head:
          # this workflow has secrets, so executing PR-head code would be a
          # token-exfiltration vector.
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        if: steps.ci.outputs.conclusion == 'success'
        with:
          enable-cache: true

      - name: Sync Python dependencies
        if: steps.ci.outputs.conclusion == 'success'
        working-directory: python
        run: uv sync --group review

      - name: Run LLM review
        if: steps.ci.outputs.conclusion == 'success'
        working-directory: python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REVIEW_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          # Override here if the model name needs to change. Per-tier
          # prices live in PRICING_PER_M inside review.py — update there
          # when bumping the model.
          REVIEW_MODEL: gpt-5.5
        run: uv run python -m lean_pool.review

      # Request Copilot's PR review. Idempotent — re-requesting the same
      # reviewer is a no-op. `if: always()` ensures Copilot still gets
      # asked even when LLM review was skipped or failed.
      - name: Request Copilot review
        if: always() && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            --input - <<'JSON' || echo "Copilot review request returned non-zero; continuing."
          {"reviewers": ["Copilot"]}
          JSON
