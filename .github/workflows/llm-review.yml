name: LLM Review

# Triggers:
#  - pull_request_target opened: first review fires when the PR is opened
#  - issue_comment containing /review: re-run on demand from a comment
#  - workflow_dispatch: manual run with a PR number
#
# Each run waits for Lean Action CI on the current head SHA and only
# pays for the gpt-5.5 call when CI is green, so the review never
# critiques code that doesn't even build. pull_request_target (rather
# than pull_request) is used so secrets/permissions are available for
# fork PRs; the workflow only checks out the base branch and never
# executes code from the PR head.
on:
  pull_request_target:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  # Needed to query Lean Action CI run status for the head SHA.
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Allow workflow_dispatch and pull_request_target unconditionally;
    # restrict issue_comment to PR comments whose body starts with
    # `/review`. (startsWith catches "/review" and "/review please ..."
    # but not casual mentions like "should we /review this?".)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/review'))
    steps:
      - name: Resolve PR number and head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          PR_FROM_PR_EVENT: ${{ github.event.pull_request.number }}
          PR_FROM_COMMENT: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            workflow_dispatch)   pr="$DISPATCH_PR" ;;
            pull_request_target) pr="$PR_FROM_PR_EVENT" ;;
            issue_comment)       pr="$PR_FROM_COMMENT" ;;
            *) echo "::error::Unexpected event $EVENT_NAME"; exit 1 ;;
          esac
          if [ -z "$pr" ]; then
            echo "::error::Could not resolve PR number"; exit 1
          fi
          head_sha=$(gh api "repos/$REPO/pulls/$pr" --jq '.head.sha')
          echo "number=$pr" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$pr at $head_sha"

      - name: Wait for Lean Action CI on this head
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          # Up to 30 minutes — enough for a cold-cache Lean build.
          deadline=$(( $(date +%s) + 1800 ))
          conclusion=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            run_json=$(gh api \
              "repos/$REPO/actions/workflows/lean_action_ci.yml/runs?head_sha=$HEAD_SHA&per_page=1" \
              --jq '.workflow_runs[0] // empty')
            if [ -n "$run_json" ]; then
              status=$(echo "$run_json" | jq -r '.status')
              if [ "$status" = "completed" ]; then
                conclusion=$(echo "$run_json" | jq -r '.conclusion // ""')
                break
              fi
              echo "Lean Action CI status: $status; waiting..."
            else
              echo "No Lean Action CI run for $HEAD_SHA yet; waiting..."
            fi
            sleep 30
          done
          if [ -z "$conclusion" ]; then
            conclusion="timed_out"
          fi
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
          echo "Lean Action CI conclusion: $conclusion"

      - name: Comment when Lean CI is not green
        if: steps.wait.outputs.conclusion != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CONCLUSION: ${{ steps.wait.outputs.conclusion }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body \
            "_LLM review skipped: Lean Action CI conclusion was \`$CONCLUSION\`. Push a fix or comment \`/review\` after CI is green._"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.wait.outputs.conclusion == 'success'
        with:
          # Always check out the base branch (default), never the PR
          # head — pull_request_target runs with secrets, so executing
          # PR-head code would be a token-exfiltration vector.
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        if: steps.wait.outputs.conclusion == 'success'
        with:
          enable-cache: true

      - name: Sync Python dependencies
        if: steps.wait.outputs.conclusion == 'success'
        working-directory: python
        run: uv sync --group review

      - name: Check whether the PR touches any .lean files
        id: lean_changes
        if: steps.wait.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          count=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate \
                  --jq '[.[] | select(.filename | endswith(".lean"))] | length')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "PR #$PR_NUMBER touches no .lean files; skipping gpt-5.5 review."
          else
            echo "PR #$PR_NUMBER touches $count .lean file(s); proceeding."
          fi

      - name: Run LLM review
        if: >-
          steps.wait.outputs.conclusion == 'success' &&
          steps.lean_changes.outputs.count != '0'
        working-directory: python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Override here if the model name needs to change. Per-tier
          # prices live in PRICING_PER_M inside review.py — update there
          # when bumping the model.
          REVIEW_MODEL: gpt-5.5
        run: uv run python -m lean_pool.review

      # Request Copilot's PR review. Idempotent — re-requesting the same
      # reviewer is a no-op. `if: always()` ensures Copilot still gets
      # asked even when LLM review was skipped or failed.
      - name: Request Copilot review
        if: always() && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            --input - <<'JSON' || echo "Copilot review request returned non-zero; continuing."
          {"reviewers": ["Copilot"]}
          JSON
