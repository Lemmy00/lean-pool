name: LLM Review

# Runs only after Lean Action CI succeeds for a pull_request, so the LLM
# never reviews code that doesn't even build. Also exposes a manual
# `workflow_dispatch` trigger for testing or for cases where the gate
# wasn't satisfied but a maintainer wants the review anyway.
on:
  workflow_run:
    workflows: ["Lean Action CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Run for manual dispatches, or for successful Lean Action CI runs that
    # were themselves triggered by a pull_request.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$DISPATCH_PR" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: PR #$DISPATCH_PR"
          else
            pr=$(jq -r '.workflow_run.pull_requests[0].number // empty' < "$GITHUB_EVENT_PATH")
            if [ -z "$pr" ]; then
              pr=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" --jq '.[0].number // empty')
            fi
            if [ -z "$pr" ]; then
              echo "No PR associated with workflow_run head sha; skipping." >&2
              exit 0
            fi
            echo "number=$pr" >> "$GITHUB_OUTPUT"
            echo "Resolved PR #$pr from workflow_run."
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true

      - name: Sync Python dependencies
        working-directory: python
        run: uv sync --group review

      - name: Run LLM review
        if: steps.pr.outputs.number != ''
        working-directory: python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Override here if the model name needs to change. Per-tier
          # prices live in PRICING_PER_M inside review.py — update there
          # when bumping the model.
          REVIEW_MODEL: gpt-5.4-mini
        run: uv run python -m lean_pool.review

      # Request Copilot's PR review now that Lean CI has passed. This
      # only matters if the repo's "Automatically request Copilot code
      # review" setting is OFF — otherwise Copilot already fired on PR
      # open. The endpoint accepts the literal reviewer name "Copilot";
      # `if: always()` means we still try this even if the LLM review
      # step above failed (it's a separate channel).
      - name: Request Copilot review
        if: always() && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            --input - <<'JSON' || echo "Copilot review request returned non-zero; continuing."
          {"reviewers": ["Copilot"]}
          JSON
