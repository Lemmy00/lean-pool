name: Stale

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale issues and PRs
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f
        with:
          days-before-pr-stale: 30
          days-before-pr-close: 14
          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-pr-label: stale
          stale-issue-label: stale
          exempt-pr-labels: pinned,roadmap,good-first-issue
          exempt-issue-labels: pinned,roadmap,good-first-issue
          stale-pr-message: This PR has been inactive for 30 days and is marked stale.
          close-pr-message: Closing this PR after another 14 days of inactivity.
          stale-issue-message: This issue has been inactive for 90 days and is marked stale.
          close-issue-message: Closing this issue after another 30 days of inactivity.
