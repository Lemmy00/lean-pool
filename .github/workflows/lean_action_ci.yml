name: Lean Action CI

on:
  push:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - 'LeanPool/projects.yml'
      - 'python/lean_pool/quality.py'
      - 'python/pyproject.toml'
      - 'python/uv.lock'
      - 'scripts/nolints-style.txt'
      - '.github/CODE_QUALITY.md'
      - '.github/workflows/lean_action_ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - 'LeanPool/projects.yml'
      - 'python/lean_pool/quality.py'
      - 'python/pyproject.toml'
      - 'python/uv.lock'
      - 'scripts/nolints-style.txt'
      - '.github/CODE_QUALITY.md'
      - '.github/workflows/lean_action_ci.yml'
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Restore caches
        id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Install Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          auto-config: false
          use-github-cache: false
          use-mathlib-cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true

      - name: Install Mathlib cache
        run: |
          if [ ! -d ".lake/packages/mathlib" ]; then
            ~/.elan/bin/lake exe cache get
          else
            echo "Mathlib already present from cache"
          fi

      - name: Check that LeanPool.lean is up to date
        run: |
          if ! ~/.elan/bin/lake exe mk_all --check; then
            echo "::error::LeanPool.lean is out of date. Run 'lake exe mk_all' locally and commit the result."
            exit 1
          fi

      - name: Build project
        run: |
          set -euo pipefail
          ~/.elan/bin/lake build LeanPool 2>&1 | tee lean-build.log
          if grep -nE '(^|: )warning:' lean-build.log; then
            echo "::error::Lean build emitted warnings; fix them before merging."
            exit 1
          fi

      - name: Lint
        run: ~/.elan/bin/lake exe runLinter LeanPool

      - name: Text style lint
        run: ~/.elan/bin/lake exe lint-style LeanPool

      - name: Repository quality checks
        run: |
          cd python
          uv sync --locked
          uv run python -m lean_pool.quality --repo ..

      - name: Save caches
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}

  proof-profile:
    runs-on: ubuntu-latest
    name: Proof profile (advisory)
    continue-on-error: true
    steps:
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Restore caches
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Install Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          auto-config: false
          use-github-cache: false
          use-mathlib-cache: false

      - name: Install Mathlib cache
        run: |
          if [ ! -d ".lake/packages/mathlib" ]; then
            ~/.elan/bin/lake exe cache get
          else
            echo "Mathlib already present from cache"
          fi

      - name: Determine new and modified Lean files
        id: files
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            # push to main, or workflow_dispatch — compare against previous commit
            base="HEAD~1"
          fi
          files=$(git diff --name-only --diff-filter=AM "$base"...HEAD -- LeanPool \
                  | grep '\.lean$' \
                  | tr '\n' ' ' || true)
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No new or modified Lean files in this diff; profile job will no-op."
          else
            echo "Will profile: $files"
          fi

      - name: Build project so profile imports resolve
        if: steps.files.outputs.files != ''
        run: ~/.elan/bin/lake build LeanPool

      - name: Profile new and modified files
        if: steps.files.outputs.files != ''
        run: |
          : > proof-profile.log
          for file in ${{ steps.files.outputs.files }}; do
            {
              echo "## $file"
              # Errors here are logged but never fail the job — this is advisory.
              ~/.elan/bin/lake env lean --profile "$file" || true
              echo
            } >> proof-profile.log 2>&1
          done

      - name: Summarize profile to job summary
        if: steps.files.outputs.files != ''
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          log_path = Path("proof-profile.log")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          metrics = ("import", "elaboration", "compilation (IR)", "type checking")

          out = ["## Proof profile (new / modified Lean files)\n\n"]
          if not log_path.exists() or not log_path.read_text().strip():
              out.append("_No proof profile output._\n")
              summary_path.write_text("".join(out))
              raise SystemExit(0)

          files: list[dict] = []
          cur: dict | None = None
          for line in log_path.read_text().splitlines():
              m = re.match(r"^## (.+)$", line)
              if m:
                  if cur is not None:
                      files.append(cur)
                  cur = {"file": m.group(1), "m": {}, "errors": 0}
                  continue
              if cur is None:
                  continue
              if "error:" in line:
                  cur["errors"] += 1
                  continue
              for key in metrics:
                  match = re.match(rf"^\s+{re.escape(key)} ([0-9.]+)ms\s*$", line)
                  if match:
                      cur["m"][key] = float(match.group(1))
                      break
          if cur is not None:
              files.append(cur)

          if not files:
              out.append("_No files profiled._\n")
          else:
              out.append(
                  "| File | Import (ms) | Elaboration (ms) | "
                  "Compilation IR (ms) | Type check (ms) | Errors |\n"
              )
              out.append("|---|---:|---:|---:|---:|---:|\n")
              for f in files:
                  m = f["m"]
                  cells = [f"`{f['file']}`"]
                  for key in metrics:
                      v = m.get(key)
                      cells.append(f"{v:.1f}" if v is not None else "—")
                  cells.append(str(f["errors"]) if f["errors"] else "0")
                  out.append("| " + " | ".join(cells) + " |\n")
              out.append(
                  "\n_Advisory only — never blocks merge. "
                  "Full log uploaded as the `proof-profile` artifact._\n"
              )
          with summary_path.open("a") as f:
              f.writelines(out)
          PY

      - name: Upload proof profile
        if: always() && steps.files.outputs.files != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: proof-profile
          path: proof-profile.log
          if-no-files-found: ignore
