name: Semantic Dedup

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'python/lean_pool/semantic_dedup.py'
      - '.github/workflows/semantic-dedup.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  leanexplore:
    runs-on: ubuntu-latest
    name: LeanExplore advisory search
    if: github.event_name == 'pull_request'
    env:
      LEANEXPLORE_API_KEY: ${{ secrets.LEANEXPLORE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Query LeanExplore
        if: env.LEANEXPLORE_API_KEY != ''
        run: |
          cd python
          uv run --with lean-explore python -m lean_pool.semantic_dedup \
            --repo .. \
            --base "origin/${{ github.base_ref }}" \
            --output ../semantic-dedup.md

      - name: Post advisory comment
        if: env.LEANEXPLORE_API_KEY != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --edit-last \
            --create-if-none \
            --body-file semantic-dedup.md
