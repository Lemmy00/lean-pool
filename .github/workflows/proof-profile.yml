name: Proof Profile

# Same triggering model as LLM Review: profile once when a PR is opened, and
# again on demand when someone comments `/profile` on the PR. No `synchronize`
# trigger — the profile is advisory, so re-run it by hand after a push if you
# want a fresh one. workflow_dispatch takes an explicit PR number.
on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to profile"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: >-
    proof-profile-${{ github.event.pull_request.number ||
      github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  profile:
    runs-on: ubuntu-latest
    name: Proof profile (advisory)
    # Run on a fresh PR or a workflow_dispatch unconditionally; for issue
    # comments, only when the body starts with `/profile` AND the commenter
    # has write access. This job checks out and *runs* the PR's Lean code,
    # so an untrusted commenter must not be able to trigger it on a fork PR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/profile') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    steps:
      - name: Resolve PR number, head SHA, base SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          PR_FROM_PR_EVENT: ${{ github.event.pull_request.number }}
          PR_FROM_COMMENT: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            workflow_dispatch) pr="$DISPATCH_PR" ;;
            pull_request)      pr="$PR_FROM_PR_EVENT" ;;
            issue_comment)     pr="$PR_FROM_COMMENT" ;;
            *) echo "::error::Unexpected event $EVENT_NAME"; exit 1 ;;
          esac
          if [ -z "$pr" ]; then echo "::error::Could not resolve PR number"; exit 1; fi
          shas=$(gh api "repos/$REPO/pulls/$pr" --jq '"\(.head.sha) \(.base.sha)"')
          head_sha=${shas%% *}
          base_sha=${shas##* }
          {
            echo "number=$pr"
            echo "head_sha=$head_sha"
            echo "base_sha=$base_sha"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$pr — head $head_sha, base $base_sha"

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Restore caches
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-${{ steps.pr.outputs.head_sha }}
          restore-keys: |
            Lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}-

      - name: Install Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          auto-config: false
          use-github-cache: false
          use-mathlib-cache: false

      - name: Install Mathlib cache
        run: |
          if [ ! -d ".lake/packages/mathlib" ]; then
            ~/.elan/bin/lake exe cache get
          else
            echo "Mathlib already present from cache"
          fi

      - name: Determine new and modified Lean files
        id: files
        env:
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
        run: |
          set -euo pipefail
          files=$(git diff --name-only --diff-filter=AM "$BASE_SHA"...HEAD -- LeanPool \
                  | grep '\.lean$' \
                  | tr '\n' ' ' || true)
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No new or modified Lean files in this diff; profile will no-op."
          else
            echo "Will profile: $files"
          fi

      - name: Build project so profile imports resolve
        if: steps.files.outputs.files != ''
        run: ~/.elan/bin/lake build LeanPool

      - name: Profile new and modified files
        if: steps.files.outputs.files != ''
        env:
          FILES: ${{ steps.files.outputs.files }}
        run: |
          : > proof-profile.log
          # shellcheck disable=SC2086 # FILES is a space-separated list on purpose
          for file in $FILES; do
            {
              echo "## $file"
              # Errors here are logged but never fail the job — this is advisory.
              ~/.elan/bin/lake env lean --profile "$file" || true
              echo
            } >> proof-profile.log 2>&1
          done

      - name: Render profile summary
        if: steps.files.outputs.files != ''
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          log_path = Path("proof-profile.log")
          rendered_path = Path("proof-profile.md")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )

          # Lean's `cumulative profiling times:` block is one indented
          # `<phase name> <number><unit>` per line, where the unit is `ms`
          # or `s`. The phase name can contain
          # spaces, parens, and hyphens (`compilation (IR)`,
          # `let-to-have transformation`, ...). Lean only emits a phase if
          # it accumulated nonzero time, so the set of phases differs per
          # file and per run; the renderer captures every phase rather than
          # cherry-picking known names.
          metric_re = re.compile(
              r"^[ \t]+(.+?)\s+([0-9]+(?:\.[0-9]+)?)\s*(ms|s)\s*$"
          )

          out = ["## Proof profile (new / modified Lean files)\n\n"]
          log_text = log_path.read_text() if log_path.exists() else ""
          if not log_text.strip():
              out.append("_No proof profile output._\n")
              rendered_path.write_text("".join(out))
              summary_path.write_text("".join(out))
              raise SystemExit(0)

          # Split the log into one section per profiled file (delimited by
          # `## <file>` markers written by the profile loop).
          sections: list[tuple[str, str]] = []
          name = None
          buf: list[str] = []
          for line in log_text.splitlines():
              header = re.match(r"^## (.+)$", line)
              if header:
                  if name is not None:
                      sections.append((name, "\n".join(buf).rstrip()))
                  name = header.group(1)
                  buf = []
              elif name is not None:
                  buf.append(line)
          if name is not None:
              sections.append((name, "\n".join(buf).rstrip()))

          if not sections:
              out.append("_No files profiled._\n")
          else:
              # Summary table: cumulative ms = sum over reported phases.
              summary_rows = []
              for fname, body in sections:
                  total = 0.0
                  phases = 0
                  errors = 0
                  for line in body.splitlines():
                      if "error:" in line:
                          errors += 1
                          continue
                      m = metric_re.match(line)
                      if m:
                          value = float(m.group(2))
                          if m.group(3) == "s":
                              value *= 1000
                          total += value
                          phases += 1
                  summary_rows.append((fname, total, phases, errors))
              summary_rows.sort(key=lambda r: -r[1])
              total_ms = sum(r[1] for r in summary_rows)
              total_phases = sum(r[2] for r in summary_rows)
              total_errors = sum(r[3] for r in summary_rows)
              out.append(
                  f"**Total cumulative time:** {total_ms:.1f} ms "
                  f"(= {total_ms / 1000:.2f} s) across {len(summary_rows)} file"
                  f"{'' if len(summary_rows) == 1 else 's'}.\n\n"
              )
              out.append("| File | Cumulative (ms) | Phases | Errors |\n")
              out.append("|---|---:|---:|---:|\n")
              for fname, total, phases, errors in summary_rows:
                  out.append(
                      f"| `{fname}` | {total:.1f} | {phases} | {errors} |\n"
                  )
              # Total row in the same table so any single file's cumulative
              # time can be compared against the whole at a glance.
              out.append(
                  f"| **Total** | **{total_ms:.1f}** "
                  f"| **{total_phases}** | **{total_errors}** |\n"
              )
              out.append("\n")

              # Full per-file output, collapsed by default so the comment
              # stays scannable when many files are profiled.
              out.append("<details><summary>Per-file profile output</summary>\n\n")
              for fname, body in sections:
                  out.append(f"#### `{fname}`\n\n")
                  out.append("```text\n")
                  out.append(body if body.strip() else "(empty)")
                  out.append("\n```\n\n")
              out.append("</details>\n")

              out.append(
                  "\n_Advisory only — never blocks merge. "
                  f"[Full log]({run_url}) uploaded as the `proof-profile` "
                  "artifact._\n"
              )

          rendered = "".join(out)
          rendered_path.write_text(rendered)
          with summary_path.open("a") as f:
              f.write(rendered)
          PY

      - name: Post sticky PR comment with profile
        if: steps.files.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Marker so we can find and update the same comment on subsequent
          # runs instead of stacking new ones.
          marker="<!-- proof-profile-comment -->"
          {
            printf '%s\n' "$marker"
            cat proof-profile.md
          } > comment-body.md

          existing=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq "[.[] | select(.body | startswith(\"$marker\"))] | first | .id // empty")

          if [ -n "$existing" ]; then
            jq -n --rawfile body comment-body.md '{body: $body}' \
              | gh api -X PATCH "repos/$REPO/issues/comments/$existing" --input -
          else
            gh pr comment "$PR_NUMBER" --body-file comment-body.md
          fi

      - name: Upload proof profile
        if: always() && steps.files.outputs.files != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: proof-profile
          path: proof-profile.log
          if-no-files-found: ignore
