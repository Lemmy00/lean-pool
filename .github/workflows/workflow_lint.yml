name: Workflow Lint

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    name: actionlint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: actionlint
        uses: reviewdog/action-actionlint@e0207a28405ecad11953ba625a95d92f7889572a
        with:
          fail_level: any

  pinned-actions:
    runs-on: ubuntu-latest
    name: SHA-pinned Actions
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Ensure Actions are pinned
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@fc87bb5b5a97953d987372e74478de634726b3e5
