arxiv:
  2606.29687v1:
    url: http://arxiv.org/abs/2606.29687v1
    first_seen_at: '2026-06-30T16:32:57+00:00'
    title: A Machine-Verified Proof of a Quantum-Optimization Conjecture
    authors:
    - Uri Kol
    - Maor Ben-Shahar
    - Kfir Sulimany
    - Dirk Englund
    published: '2026-06-29T01:25:40Z'
    updated: '2026-06-29T01:25:40Z'
    summary: 'We report a machine-verified resolution of a problem open for over a decade
      in quantum optimization: the Farhi, Goldstone and Gutmann (FGG) conjecture that depth-$p$
      Quantum Approximate Optimization Algorithm (QAOA) on the ring of disagrees attains approximation
      ratio $(2p+1)/(2p+2)$ exactly. We found the proof using a large language model, Claude
      Fable 5, and verified its correctness end-to-end by the Lean 4 proof assistant. Our
      methodology includes several ingredients: building on a substantial Lean library of
      quantum information, we formalized the QAOA components and the known parts of the problem,
      and reduced the conjecture to a single open mathematical statement. The model was then
      handed the library and our agentic toolkit, and tasked with closing that gap by constructing
      a proof in Lean. The resulting process is a feedback loop between the model''s natural-language
      reasoning and Lean''s mechanical verification, which converged to a machine-verified
      proof. Human verification is required only for the structural scaffolding - that the
      formal statement faithfully encodes the intended claim - while the proof itself is supplied
      by the model and certified mechanically by Lean. The proof is nevertheless striking
      - the model uncovered a hidden dynamical symmetry of the problem and exploited it, borrowing
      tools and machinery from an adjacent field to turn a hard existence problem into an
      explicit construction. This work paves the way for resolving open conjectures in quantum
      information science and beyond.'
    github_urls: []
  2607.00815v1:
    url: http://arxiv.org/abs/2607.00815v1
    first_seen_at: '2026-07-02T16:16:46+00:00'
    title: 'LRAT-Catcher: Importing SAT Solver Certificates into Lean4 by Reflection'
    authors:
    - Stefan Szeider
    published: '2026-07-01T11:41:01Z'
    updated: '2026-07-01T11:41:01Z'
    summary: SAT solvers settle combinatorial problems beyond the reach of interactive theorem
      provers and produce LRAT certificates for independent verification. We present LRAT-Catcher,
      a standalone, general-purpose tool that imports a DIMACS formula together with an LRAT
      certificate into Lean 4 as a theorem. LRAT-Catcher runs the formally verified LRAT checker
      from Lean core as compiled native code via reflection. This scales to instances where
      Mathlib's explicit proof-term import exhausts memory. LRAT-Catcher also composes cube-and-conquer
      solving runs entirely inside Lean. Per-cube refutations are combined with a cover-completeness
      certificate, itself an LRAT proof, into a single unsatisfiability theorem. Verified
      encodings connect CNF-level results to the original combinatorial problems. We evaluate
      the tool against Mathlib's proof-term import and the external checker cake_lpr on establishing
      the Schur number S(4) = 44 and the Ramsey number R(4,4) = 18 as Lean theorems.
    github_urls: []
