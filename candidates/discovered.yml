arxiv:
  2606.22997v1:
    url: http://arxiv.org/abs/2606.22997v1
    first_seen_at: '2026-06-24T16:34:19+00:00'
    title: A Greatest Common Divisor Criterion of Certain Binomial Coefficients
    authors:
    - Dakai Guo
    - Ruichen Qiu
    - Yichuan Cao
    - Ruyong Feng
    - Xiao-Shan Gao
    published: '2026-06-22T08:14:01Z'
    updated: '2026-06-22T08:14:01Z'
    summary: The binomial greatest common divisor (gcd) criterion recorded as OEIS A080170
      is proven. The criterion also appears as conjecture (17) in Ralf Stephan's list of OEIS
      conjectures. For $k\geq 2$, put \[ D(k)=\gcd_{2\leq q\leq k+1}\binom{qk}{k}, \qquad
      n=k+1. \] If $P$ is the largest prime-power component $p^a$ exactly dividing $n$, then
      the criterion asserts \[ D(k)=1 \quad\Longleftrightarrow\quad \frac{n}{P}>P. \] The
      proof is formalized in Lean and the Lean artifact is accepted as part of the Formal
      Conjectures project. Both the natural-language proof and the Lean formalization are
      generated by the MechMath Agent Team, an AI agent developed by the authors.
    github_urls: []
  2606.23277v1:
    url: http://arxiv.org/abs/2606.23277v1
    first_seen_at: '2026-06-24T16:34:19+00:00'
    title: 'GIF: Locally Sound Geometric Information Flow Control for LLMs'
    authors:
    - Adam Storek
    - Nikolaus Holzer
    - Zhuo Zhang
    - Suman Jana
    published: '2026-06-22T12:54:04Z'
    updated: '2026-06-22T12:54:04Z'
    summary: Large language models increasingly mediate interactions between sensitive data,
      untrusted inputs, and privileged actions in agentic systems, creating security and privacy
      risks. These range from prompt injections that manipulate downstream tool use to leakage
      of confidential information through model outputs. Recent Information Flow Control (IFC)-based
      defenses show promise but lack a principled semantic foundation for reasoning about
      information flow through the model itself. Since any input token may influence any output
      token in an autoregressive LLM, existing approaches suffer from severe taint explosion.
      We present Geometric Information Flow (GIF), a semantic framework for tracking information
      flow from input tokens to outputs. GIF uses the LLM Jacobian and local output geometry
      to upper-bound the Shannon mutual information between perturbed input spans and model
      outputs, yielding a scalable measure computable on large models via automatic differentiation
      and low-rank approximation. Unlike attention-based or correlational attribution heuristics,
      GIF satisfies local geometric soundness, and we provide a fully mechanized Lean 4 proof
      that it upper-bounds the true information flow induced by a given prompt under local
      regularity assumptions. We evaluate GIF on integrity and confidentiality tasks across
      multiple prompt-injection and privacy-leakage benchmarks. GIF achieves near-perfect
      recall even without a downstream declassifier, outperforming attention-based baselines.
      Combined with lightweight LLM-based declassifiers, it matches or exceeds the F1 of direct
      LLM-as-judge baselines such as GPT-5.5 xhigh reasoning while using up to 81x lower token
      cost. GIF flows detected with small surrogate models transfer to larger state-of-the-art
      models and other model families, even when the surrogate is up to 200x smaller, suggesting
      black-box deployment without gradient access.
    github_urls: []
  2606.23555v1:
    url: http://arxiv.org/abs/2606.23555v1
    first_seen_at: '2026-06-24T16:34:19+00:00'
    title: Cubic Jordan algebras are not a series
    authors:
    - Bruce Westbury
    published: '2026-06-22T16:27:31Z'
    updated: '2026-06-22T16:27:31Z'
    summary: The idea of the exceptional series is that the exceptional simple Lie algebras
      should form a series. Since all four simple Lie algebras in the fourth row of the Freudenthal
      magic square are exceptional it is natural to ask if the remaining rows form a series.
      A stronger version of this question is that, for the first two rows (corresponding to
      the real and complex numbers), there is a category defined by a presentation which is
      a reasonable candidate for the series. Our main results show that neither of these candidates
      is a series but each consists of a finite set of points. In each case the series is
      defined by a parameter and we show that the relations imply that this parameter satisfies
      a polynomial. These two results were obtained by a computer calculation. Our calculation
      is supported by a website for inspection, and the calculations are certified by Lean
      4.
