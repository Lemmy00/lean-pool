arxiv:
  2606.29687v1:
    url: http://arxiv.org/abs/2606.29687v1
    first_seen_at: '2026-06-30T16:32:57+00:00'
    title: A Machine-Verified Proof of a Quantum-Optimization Conjecture
    authors:
    - Uri Kol
    - Maor Ben-Shahar
    - Kfir Sulimany
    - Dirk Englund
    published: '2026-06-29T01:25:40Z'
    updated: '2026-06-29T01:25:40Z'
    summary: 'We report a machine-verified resolution of a problem open for over a decade
      in quantum optimization: the Farhi, Goldstone and Gutmann (FGG) conjecture that depth-$p$
      Quantum Approximate Optimization Algorithm (QAOA) on the ring of disagrees attains approximation
      ratio $(2p+1)/(2p+2)$ exactly. We found the proof using a large language model, Claude
      Fable 5, and verified its correctness end-to-end by the Lean 4 proof assistant. Our
      methodology includes several ingredients: building on a substantial Lean library of
      quantum information, we formalized the QAOA components and the known parts of the problem,
      and reduced the conjecture to a single open mathematical statement. The model was then
      handed the library and our agentic toolkit, and tasked with closing that gap by constructing
      a proof in Lean. The resulting process is a feedback loop between the model''s natural-language
      reasoning and Lean''s mechanical verification, which converged to a machine-verified
      proof. Human verification is required only for the structural scaffolding - that the
      formal statement faithfully encodes the intended claim - while the proof itself is supplied
      by the model and certified mechanically by Lean. The proof is nevertheless striking
      - the model uncovered a hidden dynamical symmetry of the problem and exploited it, borrowing
      tools and machinery from an adjacent field to turn a hard existence problem into an
      explicit construction. This work paves the way for resolving open conjectures in quantum
      information science and beyond.'
    github_urls: []
  2607.00815v1:
    url: http://arxiv.org/abs/2607.00815v1
    first_seen_at: '2026-07-02T16:16:46+00:00'
    title: 'LRAT-Catcher: Importing SAT Solver Certificates into Lean4 by Reflection'
    authors:
    - Stefan Szeider
    published: '2026-07-01T11:41:01Z'
    updated: '2026-07-01T11:41:01Z'
    summary: SAT solvers settle combinatorial problems beyond the reach of interactive theorem
      provers and produce LRAT certificates for independent verification. We present LRAT-Catcher,
      a standalone, general-purpose tool that imports a DIMACS formula together with an LRAT
      certificate into Lean 4 as a theorem. LRAT-Catcher runs the formally verified LRAT checker
      from Lean core as compiled native code via reflection. This scales to instances where
      Mathlib's explicit proof-term import exhausts memory. LRAT-Catcher also composes cube-and-conquer
      solving runs entirely inside Lean. Per-cube refutations are combined with a cover-completeness
      certificate, itself an LRAT proof, into a single unsatisfiability theorem. Verified
      encodings connect CNF-level results to the original combinatorial problems. We evaluate
      the tool against Mathlib's proof-term import and the external checker cake_lpr on establishing
      the Schur number S(4) = 44 and the Ramsey number R(4,4) = 18 as Lean theorems.
    github_urls: []
  2607.05739v1:
    url: http://arxiv.org/abs/2607.05739v1
    first_seen_at: '2026-07-08T16:12:14+00:00'
    title: Integer values of $\tan(\arctan 1+\arctan 2+\cdots+\arctan n)$ are rare
    authors:
    - Ken Ono
    published: '2026-07-07T01:55:06Z'
    updated: '2026-07-07T01:55:06Z'
    summary: For $n\ge1$, we let $$x_n:=\tan\bigl(\sum_{k=1}^{n}\arctan k\bigr).$$ In 2008,
      Amdeberhan, Medina, and Moll conjectured that $x_n\not \in \mathbb{Z}$ for every $n\ge5$.
      This was known for a set of positive integers of density $\tfrac{120}{817}\approx0.1469$.
      We prove that an integer value $x_n=m$ satisfies $|m|\ge e^{(1/2+o(1))\,n\log n}$, which
      we use to deduce that $$\#\{\,1\leq n\le N:x_n\in\mathbb{Z}\,\}=O(\log N). $$ In particular,
      the conjecture holds for a density-one set of $n$. The results in this note were formalized
      in Lean/Mathlib and produced autonomously by AxiomProver from natural-language statements.
    github_urls: []
  2607.05874v1:
    url: http://arxiv.org/abs/2607.05874v1
    first_seen_at: '2026-07-08T16:12:14+00:00'
    title: A Unified Framework for Formalizing Matrix Decomposition Proofs
    authors:
    - Wanli Ma
    - Zichen Wang
    - Zaiwen Wen
    published: '2026-07-07T06:09:02Z'
    updated: '2026-07-07T06:09:02Z'
    summary: 'Existence proofs for many matrix decompositions share a recursive routine: a
      local transformation prepares the matrix, a slice is selected, a recursive solution
      is obtained, and the result is lifted and transported back. Formalizing this routine
      uniformly in dependent type theory is difficult because recursive subproblems may change
      index types, and reconstruction must preserve structural predicates across block embeddings
      and reindexings. We develop a Lean~4 framework that separates decomposition schemas,
      transformations, reduction strategies, measures, lifting, transport, and subtype induction.
      The framework uses general index types, packages square and rectangular matrices in
      universe types, and provides a decomposition driver that assembles strategy data into
      subtype-induction instances. It has been instantiated across PLU, LU, LDL/Cholesky,
      QR variants, Gauss rank normal form, Hessenberg reductions, Schur variants, normal spectral
      decomposition, SVD, bidiagonalization, tridiagonalization, UTV, Smith normal form, rational
      canonical form, and Jordan-type forms at varying levels of statement strength. Across
      these instances, repeated decomposition proofs are best treated not as separate tasks
      but as instances of a more general inductive statement whose interface records a certified
      proof path compatible with the chosen decomposition statement.'
    github_urls: []
  2607.05987v1:
    url: http://arxiv.org/abs/2607.05987v1
    first_seen_at: '2026-07-08T16:12:14+00:00'
    title: Formalizing Scarf, Brouwer, and Nash in Lean
    authors:
    - Yuwei Lyu
    - Kai Li
    published: '2026-07-07T08:18:43Z'
    updated: '2026-07-07T08:18:43Z'
    summary: We formalize in Lean 4 a complete combinatorial route from Scarf's theorem to
      Brouwer's fixed point theorem and to the existence of mixed Nash equilibria in finite
      games. The development follows Ivanov's indexed-order formulation of Scarf's theorem,
      formalizes the room--door incidence structure and parity argument, instantiates the
      theorem on finite grids of the standard simplex, and carries out the compactness and
      continuity argument needed to obtain a fixed point. We then extend the result to finite
      products of simplices by an explicit embedding--projection construction and use this
      product theorem to prove mixed Nash equilibrium existence via the Nash map. As a secondary
      by-product, we derive BrouwerBench, a preliminary 80-item Lean-grounded benchmark for
      probing proof-structure understanding within this single formal development.
    github_urls: []
  2607.06089v1:
    url: http://arxiv.org/abs/2607.06089v1
    first_seen_at: '2026-07-08T16:12:14+00:00'
    title: Closed-form fractional radial links for elliptical Mahalanobis discriminant analysis
    authors:
    - Serhii Zabolotnii
    published: '2026-07-07T10:02:33Z'
    updated: '2026-07-07T10:02:33Z'
    summary: We study binary classification under shared-generator elliptical class-conditional
      distributions. The log-likelihood ratio is an additive function of the two squared Mahalanobis
      radii, with radial link $\varphi=\log g$; QDA is recovered only when this link is affine.
      We derive the Bayes radial-link family from the within-class radius law and estimate
      it by a finite fractional-power stochastic-polynomial projection instead of tuning a
      generic spline. The link is identifiable from the radius law, the plug-in estimator
      is $\sqrt{n}$-consistent and asymptotically normal under finite-moment regularity conditions,
      and the induced classifier is asymptotically Bayes-optimal in an iterated sieve limit.
      The structural bridge, GAM membership, and identity-link/affine-generator dichotomy
      are verified in Lean 4 without unproven placeholders. Against the global Mahalanobis-GAM
      of Ghosh et al. (2025), reimplemented with mgcv REML splines at equal input budget,
      the derived link is never significantly worse on three UCI benchmarks and is decisively
      better on breast_cancer ($[+0.009,+0.021]$ global, $[+0.109,+0.136]$ global+local).
      Across six real financial series under temporal-dependence-robust validation, it is
      never significantly worse than the fitted GAM and is significantly better on three of
      five heavy-tailed series plus the light-tailed control. Relative to QDA, it improves
      the heaviest-tailed series (oil $[+0.024,+0.070]$, S&P 500 $[+0.038,+0.126]$, JPY/USD
      $[+0.009,+0.047]$) and ties elsewhere. A closed-form rate simulation corroborates the
      $\sqrt{n}$ rate and the predicted excess-risk dichotomy between QDA's approximation-limited
      floor and the derived link's vanishing excess risk. The contribution is no significant
      loss relative to a tuned global GAM without spline smoothing-parameter selection, plus
      improved accuracy over QDA where generator curvature matters.
    github_urls: []
  2607.06341v1:
    url: http://arxiv.org/abs/2607.06341v1
    first_seen_at: '2026-07-08T16:12:14+00:00'
    title: Harnessing Code Agents for Automatic Software Verification
    authors:
    - Shuangxiang Kan
    - Shuanglong Kan
    - Sebastian Ertel
    published: '2026-07-07T14:39:59Z'
    updated: '2026-07-07T14:39:59Z'
    summary: 'Formal verification offers the strongest guarantee of software correctness,
      but it does not scale: the proofs demanded by interactive theorem provers such as Coq
      require enormous expert effort. Large language models (LLMs) promise to generate these
      proofs automatically, yet existing approaches wire a fixed, human-designed proof strategy
      into the system and constrain the model to follow it (retrieving premises and predicting
      tactics one step at a time, or splitting goals by divide-and-conquer), and still prove
      only a fraction of their target theorems. We show that imposing such a strategy is unnecessary
      and limiting. Handing the whole lemma to a general LLM code agent (for example, Claude
      Code), free to choose its own approach, and wrapping it in a verification harness is
      both simpler and more effective, achieving full coverage: every targeted lemma proved,
      with no failures and no Coq expert intervention. The agent writes the proofs under feedback
      and hard constraints from the harness that keep each one sound (accepted only when the
      prover''s kernel closes it), complete (no obligation left unproved or silently dropped),
      and terminating (no divergent tactics). We evaluate this harness plus code agent along
      three dimensions. (1) Core logic: on Iris, the state-of-the-art separation logic for
      concurrent and memory-manipulating programs, Aria proves all 4,257 lemmas of the four
      core modules and the 217 lemmas verifying Rust''s standard libraries built on it, fully
      automatically. (2) Comparison with prior LLM provers: on reglang, where prior provers
      manage barely one in eight, Aria proves all 318. (3) Generality: on iris-lean, the unfinished
      Lean 4 port of Iris, it proves 72 not-yet-ported lemmas, showing the approach is not
      specific to Coq. A state-of-the-art model (Claude Opus 4.7) can write proofs for verified
      software development fully and automatically.'
    github_urls: []
  2607.06379v1:
    url: http://arxiv.org/abs/2607.06379v1
    first_seen_at: '2026-07-08T16:12:14+00:00'
    title: 'Axioms for physical reasoning: codifying the Seiberg--Witten solution in Lean'
    authors:
    - Michael R. Douglas
    published: '2026-07-07T15:18:50Z'
    updated: '2026-07-07T15:18:50Z'
    summary: 'Mathematicians have embraced interactive theorem provers with growing enthusiasm
      -- building large shared libraries and machine-checking a string of landmark results.
      Theoretical physics is different: most of its results are not theorems but justified
      by arguments the community trusts without a rigorous proof. For many -- the one we treat
      here among them -- no rigorous proof is within reach. For 4d Yang--Mills theory, deriving
      exact rigorous results from first principles would first require constructing the interacting
      theory nonperturbatively, which is a sizable piece of one of the Clay Millennium prize
      problems. We argue here that an interactive theorem prover can be used to verify some
      non-rigorous physics arguments. The method is to postulate a short list of explicit,
      named physical postulates, which imply the physical results by virtue of a machine-checkable
      proof. The trust that remains then rests on that short, inspectable list, and the prover
      can report, for any downstream result, exactly which assumptions it used. We carry this
      out for the Seiberg--Witten solution of ${N}=2$ $SU(2)$ super-Yang--Mills -- the genus-one
      case -- formalized in Lean 4; the higher-genus $SU(N)$ generalization is developed in
      the same repository as an axiomatized skeleton and left to future work. We describe
      what is proved, what is assumed, how the assumptions are checked -- external review
      and an independent numerical oracle -- and why this discipline is a sound standard for
      validating AI-generated results in theoretical physics. What we offer is a discipline,
      reviewable on its own terms: a reader may take the Seiberg--Witten mathematics on trust
      and still assess the formalization method.'
    github_urls: []
  2607.06944v1:
    url: http://arxiv.org/abs/2607.06944v1
    first_seen_at: '2026-07-09T16:42:45+00:00'
    title: $p$-adic Hahn series with sparse support
    authors:
    - Shanwen Wang
    - Yijun Yuan
    published: '2026-07-08T03:14:19Z'
    updated: '2026-07-08T03:14:19Z'
    summary: Let $p$ be a prime number. We introduce a sparseness condition on the supports
      of $p$-adic Hahn series, and prove that this condition implies transcendence over $\breve{\mathbf
      Q}_p$, the completed maximal unramified extension of $\mathbf{Q}_p$. As an application,
      we prove the order-type conjecture of $\mathbf{Q}_p$-algebraic $p$-adic Hahn series
      with bounded support under the condition that the support has only finitely many accumulation
      points. All results in this paper have been fully formalized in the Lean theorem prover
      (v 4.31.0), building over Mathlib.
    github_urls: []
  2607.08366v1:
    url: http://arxiv.org/abs/2607.08366v1
    first_seen_at: '2026-07-10T16:34:26+00:00'
    title: Minimum modulus for the unique multiset-sum problem
    authors:
    - "Jos\xE9 A. R. Fonollosa"
    published: '2026-07-09T11:23:23Z'
    updated: '2026-07-09T11:23:23Z'
    summary: 'Fix $n \ge 2$. A set $A = \{a_0 < a_1 < \dots < a_{n-1}\}$ of $n$ residues in
      $\Z_N$ is \emph{valid mod $N$} if the all-ones multiset is the \emph{only} size-$n$
      multiset drawn from $A$ whose sum is $p := \sum_i a_i \pmod N$. For the super-increasing
      set $A = \{2^k - 1 : 0 \le k \le n-1\}$ we determine the least valid modulus exactly:
      $\Nmin(n) = 2^{\,n} - 2^{\lfloor \log_2 n \rfloor}$ for all $n \ge 2$. Both directions
      of the proof are elementary, resting on a sharp minimal-digit-sum estimate for representations
      by binary coins, and the full theorem has been machine-checked in Lean~4/Mathlib for
      all $n$ (https://github.com/jarfo/min-modulus). We conjecture that no size-$n$ residue
      set admits a smaller valid modulus. This validity condition is exactly what makes the
      permanent of an $n \times n$ matrix equal to a single coefficient of a row-product polynomial
      modulo $x^N - 1$, extractable by a size-$N$ discrete Fourier (or number-theoretic) transform;
      the theorem thus identifies the smallest transform, $N \approx 2^n$, for which this
      evaluation is exact. That application -- and the resulting common framework for the
      classical formulas of Ryser and Glynn and this transform -- is developed in a companion
      paper [2].'
    github_urls: []
  2607.08656v1:
    url: http://arxiv.org/abs/2607.08656v1
    first_seen_at: '2026-07-10T16:34:26+00:00'
    title: Cantor measures with odd base do not admit Fourier frames
    authors:
    - Jaume de Dios Pont
    - Lukas Liehr
    - Mitchell A. Taylor
    published: '2026-07-09T16:26:26Z'
    updated: '2026-07-09T16:26:26Z'
    summary: We prove that the Cantor measure with base $b$ does not admit a Fourier frame
      whenever $b > 1$ is an odd integer. In particular, this answers a question of Strichartz
      on the existence of a Fourier frame for the middle third Cantor measure. A formalization
      of our main result in Lean 4 is also provided.
    github_urls: []
  2607.08692v1:
    url: http://arxiv.org/abs/2607.08692v1
    first_seen_at: '2026-07-10T16:34:26+00:00'
    title: 'From Rules to Nash Equilibria: A Lean 4 Case Study in Game-Theoretic Analysis
      of a Competitive Trading Card Game'
    authors:
    - Arthur F. Ramos
    - Tulio Soria
    published: '2026-07-09T16:52:05Z'
    updated: '2026-07-09T16:52:05Z'
    summary: 'We present a metagame analysis of the competitive Pokemon Trading Card Game,
      machine-checked in Lean 4 over real tournament data. The headline game-theoretic results,
      including Nash equilibrium, replicator dynamics, and the matrix-level type-bridge computation,
      rely on native_decide, which trusts Lean''s compiler rather than its kernel; the trust
      boundary is made explicit. The artifact spans approximately 31,900 lines, 87 files,
      and 2,627 theorems, of which roughly 200 directly verify empirical claims, with no sorry,
      admit, or custom axioms. Analyzing Trainer Hill data from January to February 2026 for
      events with at least 50 players, over 14 archetypes and their full pairwise matchup
      matrix, we prove a popularity paradox: the most played deck, Dragapult, with 15.5% metagame
      share, has only 46.7% expected win rate, while Grimmsnarl, with 5.1% share, achieves
      52.7%. A machine-checked Nash equilibrium of the raw game assigns Dragapult 0% weight;
      exhaustive enumeration over all nonempty support subsets confirms a unique symmetric
      Nash equilibrium of the constant-sum symmetrization with seven-deck support. Against
      this equilibrium mix, Dragapult falls 40.4 permil below the game value. Single-step
      replicator dynamics indicate downward fitness pressure on Dragapult, upward pressure
      on Grimmsnarl, and strongest extinction pressure on Alakazam. A 10,000-iteration sensitivity
      analysis confirms qualitative stability, with core support decks appearing in more than
      96% of resampled equilibria. The primary contribution is methodological: a reproducible
      case study showing how formal verification can turn qualitative metagame narratives
      into machine-checkable, re-runnable strategic science.'
    github_urls: []
