  - slug: forward-euler
    title: Forward Euler Method
    summary: Proves convergence of the explicit Euler method for ordinary differential equations.
    branch: numerical analysis
    entry_module: LeanPool.ForwardEuler
    authors:
      - Vasily Ilin
      - Aristotle
    source:
      url: https://github.com/Vilin97/forward_euler
      github_repo: Vilin97/forward_euler
    status: verified
    main_declarations:
      - ODE.EulerMethod.dist_path_le
      - ODE.EulerMethod.tendsto_path
    main_results:
      - declaration: ODE.EulerMethod.dist_deriv_le
        informal: Bounds the local difference between the Euler derivative and the vector field along the Euler path.
      - declaration: ODE.EulerMethod.dist_path_le
        informal: Bounds the distance between the Euler path and an exact solution using Gronwall's inequality.
      - declaration: ODE.EulerMethod.tendsto_path
        informal: Proves that Euler paths converge pointwise to the true solution as the step size tends to zero from above.
    tags:
      - numerical-analysis
      - ordinary-differential-equations
      - numerical-methods
    msc:
      - "65L05"
      - "34A45"
