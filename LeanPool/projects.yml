        informal: Characterizes online learnability by finite Littlestone dimension.
      - declaration: pac_not_implies_online
        informal: Separates PAC learnability from online learnability.
      - declaration: ex_not_implies_pac
        informal: Separates explanatory learnability from PAC learnability.
