      - pentagonalNumberTheorem_powerSeries
      - Nat.Partition.sum_partition
    main_results:
      - declaration: pentagonalNumberTheorem_powerSeries
        informal: Proves Euler's pentagonal number theorem as a formal power series identity ∏(1-xⁿ) = Σ(-1)ᵏ x^(k(3k-1)/2).
      - declaration: pentagonalNumberTheorem_complex
        informal: Proves the analytic version of the pentagonal number theorem for real or complex numbers of norm less than one.
      - declaration: Nat.Partition.sum_partition
        informal: Derives Euler's pentagonal recurrence for the partition function from the pentagonal number theorem.
    tags:
