  - slug: circuit-complexity
    title: Circuit Complexity in Lean 4
    summary: A Lean 4 formalization of classical Boolean circuit complexity, including the Shannon counting lower bound, Schnorr's XOR gate lower bound, a gate-elimination lower bound, CNF/DNF lower bounds for parity, and nondeterministic quantification complexity bounds.
    branch: boolean circuit complexity lower bounds
    entry_module: LeanPool.CircuitComplexity
    authors:
      - Samuel Schlesinger
    source:
      url: "https://github.com/SamuelSchlesinger/circuit-complexity"
