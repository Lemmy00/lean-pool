  - slug: pentagonal-number-theorem
    title: Euler's pentagonal number theorem
    summary: Formalizes Euler's pentagonal number theorem as a generating-function identity for power series and for real/complex numbers, with a partition-recurrence corollary and a self-contained Franklin-style combinatorial proof.
    branch: number theory
    entry_module: LeanPool.PentagonalNumberTheorem
    authors:
