    license: Apache-2.0
    status: verified
    main_declarations:
      - CircuitComplexity.shannon_lower_bound_circuit
    main_results:
      - declaration: CircuitComplexity.shannon_lower_bound_circuit
        informal: For N at least 6, there exists a Boolean function on N inputs that cannot be computed by any fan-in-2 AND/OR circuit of size at most 2^N / (5N).
      - declaration: CircuitComplexity.schnorr_lower_bound_circuit
        informal: Any fan-in-2 AND/OR circuit computing the N-input XOR function (or its complement) has at least 2(N-1) internal gates.
      - declaration: CircuitComplexity.Circuit.gate_elimination_lower_bound
        informal: Any circuit over bounded fan-in k AND/OR computing a function with n' essential inputs has size at least n' / k.
      - declaration: CircuitComplexity.DNF.xorBool_complexity_lb
        informal: Any DNF formula computing the N-input XOR function requires at least 2^(N-1) terms.
      - declaration: CircuitComplexity.CNF.xorBool_complexity_lb
        informal: Any CNF formula computing the N-input XOR function requires at least 2^(N-1) clauses.
      - declaration: CircuitComplexity.existQuantify_complexity_le
        informal: If a function f has circuit complexity s, then the existential quantification of f over a k-bit block has circuit complexity at most 2^k * (s + 1).
    tags:
