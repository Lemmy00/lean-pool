      - translationInvariance
    main_results:
      - declaration: main3
        informal: Proves that the maximum value of an arithmetic frieze pattern of width n is exactly the n-th Fibonacci number, and that this bound is attained.
      - declaration: FluteBounded
        informal: Proves that every entry of an n-flute is bounded above by the n-th Fibonacci number.
      - declaration: glideSymm
        informal: Proves the glide-reflection symmetry of Coxeter frieze patterns.
      - declaration: translationInvariance
        informal: Proves the (n+1)-periodicity (horizontal translation invariance) of Coxeter frieze patterns.
