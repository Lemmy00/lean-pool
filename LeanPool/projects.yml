projects:
  - slug: ramanujan-tau-misses-primes
    title: ABC implies that Ramanujan's tau function misses almost all primes
    summary: Formalizes the ABC-conditional proof that Ramanujan's tau function takes prime values only rarely.
    branch: analytic number theory
    entry_module: LeanPool.RamanujanTauMissesPrimes
    authors:
      - Evan Chen
      - Kenny Lau
      - Ken Ono
      - Jujian Zhang
    source:
      arxiv: "2603.29970"
      github_repo: AxiomMath/ramanujan-tau-misses-primes
    status: verified
    main_declarations:
      - main_theorem
      - reduction_lemma
      - abc_bound_E2
      - abc_bound_E4
    main_results:
      - declaration: main_theorem
        informal: ABC implies that Ramanujan's tau function misses almost all primes.
      - declaration: reduction_lemma
        informal: Reduces the main prime-value statement to the key analytic estimates.
      - declaration: abc_bound_E2
        informal: ABC-bound input for the Eisenstein-series term E2.
      - declaration: abc_bound_E4
        informal: ABC-bound input for the Eisenstein-series term E4.
    tags:
      - number-theory
      - modular-forms
    msc:
      - "11F30"
      - "11N05"
