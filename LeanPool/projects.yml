  - slug: primecert
    title: Formally verified primality certificates
    summary: Implements Pocklington's primality test and the cube-root Brillhart-Lehmer-Selfridge variant in Lean 4, with custom metaprogramming to produce compact, kernel-checkable primality certificates.
    branch: primality certificates
    entry_module: LeanPool.PrimeCert
    authors:
      - Kenny Lau
      - Bhavik Mehta
    source:
      doi: "10.1090/S0025-5718-1975-0384673-1"
      url: "https://github.com/b-mehta/PrimeCert"
      github_repo: b-mehta/PrimeCert
    status: verified
    main_declarations:
      - pocklington_test
      - PrimeCert.pocklington3_test
      - wieferich_mirimanoff
    main_results:
      - declaration: pocklington_test
        informal: "The core Pocklington divisor theorem: every prime factor of N is congruent to 1 modulo a fully factored divisor F of N - 1, given pseudo-primitive roots for each prime factor of F."
        source_ref: "H. C. Pocklington, The Determination of the Prime or Composite Nature of Large Numbers by Fermat's Theorem, Proceedings of the Cambridge Philosophical Society 18:29-30, 1914."
      - declaration: pocklington_certify
        informal: Certifies that N is prime when a fully factored divisor F of N - 1 exceeds the square root of N and the Pocklington primitive-root predicate holds for a single root.
        source_ref: "H. C. Pocklington, The Determination of the Prime or Composite Nature of Large Numbers by Fermat's Theorem, Proceedings of the Cambridge Philosophical Society 18:29-30, 1914."
      - declaration: PrimeCert.pocklington3_test
        informal: The cube-root (Brillhart-Lehmer-Selfridge) variant of the Pocklington test, requiring only a divisor F of N - 1 exceeding the cube root of N together with a sieve and a non-square certificate.
        source_ref: "J. Brillhart, D. H. Lehmer, and J. L. Selfridge, New Primality Criteria and Factorizations of 2^m ± 1, Mathematics of Computation 29(130):620-647, 1975, doi:10.1090/S0025-5718-1975-0384673-1."
      - declaration: wieferich_mirimanoff
        informal: No prime below 6000 is simultaneously a Wieferich prime and a Mirimanoff prime.
        source_ref: "J. Brillhart, D. H. Lehmer, and J. L. Selfridge, New Primality Criteria and Factorizations of 2^m ± 1, Mathematics of Computation 29(130):620-647, 1975, doi:10.1090/S0025-5718-1975-0384673-1."
    tags:
      - number-theory
      - primality-testing
      - pocklington
      - primality-certificate
      - metaprogramming
    msc:
      - "11A41"
      - "11Y11"
  - slug: circuit-complexity
    title: Circuit Complexity in Lean 4
    summary: A Lean 4 formalization of classical Boolean circuit complexity, including the Shannon counting lower bound, Schnorr's XOR gate lower bound, a gate-elimination lower bound, CNF/DNF lower bounds for parity, and nondeterministic quantification complexity bounds.
    branch: boolean circuit complexity lower bounds
    entry_module: LeanPool.CircuitComplexity
    authors:
      - Samuel Schlesinger
    source:
      url: "https://github.com/SamuelSchlesinger/circuit-complexity"
      github_repo: SamuelSchlesinger/circuit-complexity
    status: verified
    main_declarations:
      - CircuitComplexity.shannon_lower_bound_circuit
    main_results:
      - declaration: CircuitComplexity.shannon_lower_bound_circuit
        informal: For N at least 6, there exists a Boolean function on N inputs that cannot be computed by any fan-in-2 AND/OR circuit of size at most 2^N / (5N).
      - declaration: CircuitComplexity.schnorr_lower_bound_circuit
        informal: Any fan-in-2 AND/OR circuit computing the N-input XOR function (or its complement) has at least 2(N-1) internal gates.
      - declaration: CircuitComplexity.Circuit.gate_elimination_lower_bound
        informal: Any circuit over bounded fan-in k AND/OR computing a function with n' essential inputs has size at least n' / k.
      - declaration: CircuitComplexity.DNF.xorBool_complexity_lb
        informal: Any DNF formula computing the N-input XOR function requires at least 2^(N-1) terms.
      - declaration: CircuitComplexity.CNF.xorBool_complexity_lb
        informal: Any CNF formula computing the N-input XOR function requires at least 2^(N-1) clauses.
      - declaration: CircuitComplexity.existQuantify_complexity_le
        informal: If a function f has circuit complexity s, then the existential quantification of f over a k-bit block has circuit complexity at most 2^k * (s + 1).
    tags:
      - circuit-complexity
      - boolean-functions
      - lower-bounds
      - shannon-bound
      - parity
    msc:
      - "68Q06"
      - "94C11"
  - slug: computability
    title: Oracle Computability and Turing Degrees
    summary: Formalizes oracle-relative computability via partial recursive functions, Turing reducibility and the Turing degrees as an upper semilattice, a Gödel numbering with a universal oracle machine, the jump operator, and the arithmetical hierarchy.
    branch: computability theory
    entry_module: LeanPool.Computability
    authors:
      - Tanner Duve
      - Elan Roth
    source:
      url: "https://github.com/tannerduve/computability"
      github_repo: tannerduve/computability
    status: verified
    main_declarations:
      - Computability.RecursiveIn
      - Computability.TuringDegree
    main_results:
      - declaration: Computability.RecursiveIn
        informal: "The inductive relation `RecursiveIn O f` stating that `f : ℕ →. ℕ` is partial recursive relative to a set of oracle functions `O`."
      - declaration: Computability.exists_code_rel
        informal: Universality of the oracle evaluator `evalo`, that is, `RecursiveIn (Set.range g) f` holds iff there is a code `c` with `evalo g c = f`.
      - declaration: Computability.TuringReducible
        informal: "`f` is Turing reducible to `g` (`f ≤ᵀ g`) when `f` is recursive in the singleton oracle set `{g}`."
      - declaration: Computability.TuringDegree
        informal: The type of Turing degrees, the antisymmetrization of partial functions under Turing reducibility.
      - declaration: Computability.jump_recIn
        informal: The original function is Turing reducible to its jump, `f ≤ᵀ f⌜`.
      - declaration: Computability.TuringDegree.instSemilatticeSup
        informal: The Turing degrees form an upper semilattice with the Turing join as supremum.
    tags:
      - computability
      - oracle-computability
      - turing-degrees
      - recursion-theory
      - arithmetical-hierarchy
    msc:
      - "03D30"
      - "03D28"
