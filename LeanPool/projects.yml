    status: verified
    main_declarations:
      - BruhatTits.BTtree
      - BruhatTits.BTlaplace_surjective
    main_results:
      - declaration: BruhatTits.BTtree
        informal: Proves that the Bruhat-Tits graph is a tree.
      - declaration: BruhatTits.btgraph_regular
        informal: Proves regularity of the Bruhat-Tits graph when the residue field is finite.
      - declaration: BruhatTits.BTlaplace_surjective
        informal: Proves surjectivity of the Bruhat-Tits Laplacian on harmonic cochains.
