  - slug: frieze-patterns
    title: Maxima of Coxeter frieze patterns are Fibonacci numbers
    summary: Formalizes the claim that the sequence of maxima of values of (Coxeter) arithmetic frieze patterns is the Fibonacci sequence, using a correspondence between arithmetic frieze patterns and n-flutes.
    branch: combinatorics
    entry_module: LeanPool.FriezePatterns
