projects:
  - slug: biswal
    title: Chebyshev Quotients and Demazure Multiplicities
    summary: >-
      Formalizes positivity results for the coefficients of Chebyshev-type
      polynomial quotients attached to integer partitions, modelling Demazure
      multiplicities. Proves that the relevant generating function is a
      polynomial and that its coefficients are eventually positive (Theorem 1),
      gives explicit Cauchy-product and matrix-inverse formulas for the
      coefficients (Theorem 2), and establishes their nonnegativity through a
      Dyck-path lattice counting model (Theorem 3).
    branch: algebraic combinatorics
    entry_module: LeanPool.Biswal
    authors:
      - Jujian Zhang
    source:
      title: "Chebyshev quotients, Demazure multiplicities, and Dyck-path models"
      authors:
        - Evan Chen
        - Kenny Lau
        - Seewoo Lee
        - Ken Ono
        - Jujian Zhang
      arxiv: "2604.25246"
      github_repo: AxiomMath/Biswal
    license: MIT
    status: verified
    main_declarations:
      - Biswal.Theorem23.thm_manifest_coeff_nonneg
    main_results:
      - declaration: Biswal.Theorem1.genFun_is_polynomial
        informal: >-
          Proves that the generating function attached to a partition is a
          polynomial whenever its parts are bounded by the parameter `m`.
      - declaration: Biswal.Theorem1.genFun_coeff_eventually_pos
        informal: >-
          Proves that the coefficients of the generating function attached to a
          partition are eventually strictly positive.
      - declaration: Biswal.Theorem23.thm_manifest_coeff_nonneg
        informal: >-
          Proves that every coefficient of the generating function is
          nonnegative, via the explicit Dyck-path lattice counting model.
    tags:
      - algebraic-combinatorics
      - chebyshev
      - demazure
    msc:
      - "05E10"
  - slug: pythagorean-polynomial-parametrization
    title: Polynomial parametrizations of Pythagorean triples
    summary: Formalizes Frisch and Vaserstein's result that Pythagorean triples are not parametrizable by one triple of integer-coefficient polynomials in any number of variables, but are parametrizable by a single triple of integer-valued rational polynomials, including the positive and sixteen-parameter variants.
    branch: number theory
    entry_module: LeanPool.PythagoreanPolynomialParametrization
    authors:
      - Lazar Milikic
    source:
      title: Parametrization of Pythagorean triples by a single triple of polynomials
      authors:
        - Sophie Frisch
        - Leonid Vaserstein
      arxiv: "0706.0290"
      doi: "10.1016/j.jpaa.2007.05.019"
      github_repo: epfl-lara/AutoformalizedProjects
    license: Apache-2.0
    status: verified
    main_declarations:
      - LeanPool.PythagoreanPolynomialParametrization.exists_int_valued_parametrization
    main_results:
      - declaration: LeanPool.PythagoreanPolynomialParametrization.no_int_poly_parametrization
        informal: Proves that no single triple of integer-coefficient polynomials in any number of variables parametrizes all Pythagorean triples.
      - declaration: LeanPool.PythagoreanPolynomialParametrization.exists_int_valued_parametrization
        informal: Gives the explicit four-variable integer-valued polynomial parametrization of all Pythagorean triples.
      - declaration: LeanPool.PythagoreanPolynomialParametrization.positive_triples_parametrization
        informal: Formalizes the positive Pythagorean-triple parametrization with positive parameters and a nonnegative auxiliary parameter.
      - declaration: LeanPool.PythagoreanPolynomialParametrization.exists_16_param_parametrization
        informal: Converts the positive parametrization to an unrestricted sixteen-integer-parameter parametrization using the four-square theorem.
      - declaration: LeanPool.PythagoreanPolynomialParametrization.single_intValued_parametrization_yields_finite_intPoly_parametrization
        informal: Proves the cited reduction from one integer-valued polynomial tuple to finitely many integer-coefficient polynomial tuples.
      - declaration: LeanPool.PythagoreanPolynomialParametrization.integerValued_polynomial_ring_not_uniqueFactorization
        informal: Records the integer-valued polynomial ring non-UFD phenomenon behind the paper's motivating discussion.
    tags:
      - number-theory
      - pythagorean-triples
      - integer-valued-polynomials
    msc:
      - "11D09"
      - "11D85"
      - "13F20"
  - slug: cramer-wold
    title: The Cramer-Wold theorem
    summary: Formalizes the finite-dimensional Cramer-Wold theorem for measures on Euclidean spaces, with Banach-space continuous-dual generalizations, Hilbert-space inner-product versions, and random-variable law corollaries for identical distributions and `HasLaw`.
    branch: probability theory
    entry_module: LeanPool.CramerWold
    authors:
      - Lazar Milikic
    source:
      title: Some theorems on distribution functions
      authors:
        - Harald Cramer
        - Herman Wold
      doi: "10.1112/jlms/s1-11.4.290"
      github_repo: Lemmy00/lean-pool
    license: Apache-2.0
    status: verified
    main_declarations:
      - LeanPool.CramerWold.euclideanSpace_measure_eq_of_forall_inner_map_eq
    main_results:
      - declaration: LeanPool.CramerWold.euclideanSpace_measure_eq_of_forall_inner_map_eq
        informal: Proves the classical finite-dimensional Cramer-Wold theorem for finite Borel measures on `EuclideanSpace ℝ (Fin n)`, showing equality when all scalar projections have equal pushforward measures.
      - declaration: LeanPool.CramerWold.measure_eq_of_forall_dual_map_eq
        informal: Generalizes the extensionality criterion to finite Borel measures on complete second-countable real normed spaces, using all continuous-linear real projections.
      - declaration: LeanPool.CramerWold.measure_eq_of_forall_inner_map_eq
        informal: Specializes Cramer-Wold extensionality to real Hilbert spaces, using scalar projections of the form `x ↦ ⟪t, x⟫_ℝ`.
      - declaration: LeanPool.CramerWold.identDistrib_of_forall_dual_comp_identDistrib
        informal: Proves that two finite-measure random variables are identically distributed when every continuous-linear real projection of them is identically distributed.
      - declaration: LeanPool.CramerWold.identDistrib_of_forall_inner_comp_identDistrib
        informal: Gives the Hilbert-space random-variable version using all scalar inner-product projections.
      - declaration: LeanPool.CramerWold.hasLaw_of_forall_dual_comp_hasLaw
        informal: Proves that a random variable has a target law when every continuous-linear real projection has the corresponding projected target law.
    tags:
      - probability
      - measure-theory
      - characteristic-functions
      - cramer-wold
    msc:
      - "60B11"
      - "60E10"
      - "28A33"
  - slug: cencov-petz
    title: Finite Čencov-Petz Uniqueness
    summary: Formalizes the finite/discrete Čencov-Petz uniqueness theorem, showing that any continuous metric family on finite probability simplexes that is monotone under Markov morphisms is a scalar multiple of the Fisher information metric.
    branch: information geometry
    entry_module: LeanPool.CencovPetz
    authors:
      - Adam Benenson
    source:
      title: Statistical Decision Rules and Optimal Inference
      authors:
        - N. N. Chentsov
      url: https://bookstore.ams.org/mmono-53
      github_repo: abenenson/cencov-petz
    license: Apache-2.0
    status: verified
    main_declarations:
      - LeanPool.CencovPetz.MonotoneMetricFamily.eq_smul_fisher_of_continuous
    main_results:
      - declaration: LeanPool.CencovPetz.MonotoneMetricFamily.eq_smul_fisher_of_continuous
        informal: Proves that every continuous monotone metric family on a finite probability simplex is a scalar multiple of the Fisher information metric.
        source_ref: "N. N. Chentsov, Statistical Decision Rules and Optimal Inference, AMS Translations of Mathematical Monographs 53, 1982."
      - declaration: LeanPool.CencovPetz.MonotoneMetricFamily.eq_smul_fisher_of_isRational
        informal: Establishes the scalar Fisher-form identity at rational simplex points using split representations.
      - declaration: LeanPool.CencovPetz.MonotoneMetricFamily.eq_smul_fisher_of_isSplitRepresentable
        informal: Proves the scalar Fisher-form identity for simplex points represented as pushforwards of uniform distributions under splitting maps.
      - declaration: LeanPool.CencovPetz.MonotoneMetricFamily.uniformScalar_eq_uniformScalar_two
        informal: Shows that the uniform-point scalar is independent of simplex dimension once the dimension is at least two.
      - declaration: LeanPool.CencovPetz.TangentFin.Bilin.B_eq_smul_fisherBilin_uniform
        informal: Proves that the permutation-invariant bilinear form at a uniform finite simplex point is a scalar multiple of the Fisher bilinear form.
    tags:
      - information-geometry
      - fisher-information
      - markov-morphisms
      - finite-simplex
    msc:
      - "62B10"
      - "53C21"
  - slug: demazureoperatorslean
    title: Demazure Operators and Lean
    summary: Formalizes Demazure operators on multivariate polynomials and their nilpotence, braid, commutation, and symmetric-polynomial linearity relations, with auxiliary Coxeter-theory support including strong exchange and a conditional Matsumoto theorem.
    branch: algebraic combinatorics
    entry_module: LeanPool.DemazureOperatorsLean
    authors:
      - Óscar Álvarez Sánchez
    source:
      title: "Schubert cells, and the cohomology of the spaces G/P"
      authors:
        - I. N. Bernstein
        - I. M. Gelfand
        - S. I. Gelfand
      doi: "10.1070/RM1973v028n03ABEH001557"
      github_repo: bolito2/DemazureOperatorsLean
    license: Apache-2.0
    status: verified
    main_declarations:
      - Demazure.Dem
      - CoxeterSystem.strongExchangeProperty
    main_results:
      - declaration: Demazure.Dem
        informal: Defines the Demazure operator as a linear map over the subalgebra of symmetric polynomials.
      - declaration: Demazure.demazure_order_two
        informal: Proves that applying the Demazure operator twice gives zero.
      - declaration: Demazure.demazure_commutes_adjacent
        informal: Proves the braid relation for adjacent Demazure operators.
      - declaration: Demazure.demazure_commutes_non_adjacent
        informal: Proves that non-adjacent Demazure operators commute.
      - declaration: Demazure.demazure_mul_symm
        informal: Proves that symmetric polynomials act as scalars with respect to Demazure operators.
      - declaration: CoxeterSystem.strongExchangeProperty
        informal: Proves the strong exchange property for Coxeter systems.
        source_ref: "J. E. Humphreys, Reflection Groups and Coxeter Groups, Cambridge University Press, 1990."
      - declaration: CoxeterSystem.matsumoto_reduced
        informal: Auxiliary theorem proving, under the extra MatsumotoCondition hypothesis, that reduced words for the same Coxeter group element are connected by braid moves.
        source_ref: "J. E. Humphreys, Reflection Groups and Coxeter Groups, Cambridge University Press, 1990."
    tags:
      - algebraic-combinatorics
      - demazure-operators
      - polynomials
      - representation-theory
    msc:
      - "05E05"
      - "13P10"
      - "20F55"
  - slug: demazure-product
    title: Extended Demazure Product on ASP Permutations
    summary: Formalizes the extended Demazure product on almost-sign-preserving integer permutations, including slipface models, residuals, greedy and stingy characterizations, reduction theorems, adjacent-transposition formulas, and 321-avoiding factorization results.
    branch: algebraic combinatorics
    entry_module: LeanPool.DemazureProduct
    authors:
      - Nathan Pflueger
    source:
      title: An extended Demazure product on integer permutations via min-plus matrix multiplication
      authors:
        - Nathan Pflueger
      arxiv: "2206.14227"
      github_repo: npflueger/demazure
    license: Apache-2.0
    status: verified
    main_declarations:
      - LeanPool.DemazureProduct.AspPerm.star
    main_results:
      - declaration: LeanPool.DemazureProduct.AspPerm.star
        informal: Defines the extended Demazure product on almost-sign-preserving permutations.
      - declaration: LeanPool.DemazureProduct.AspPerm.star_assoc
        informal: Proves associativity of the extended Demazure product on almost-sign-preserving permutations.
      - declaration: LeanPool.DemazureProduct.Reduction.starGreedy
        informal: Characterizes the Demazure product as the Bruhat-maximum of ordinary products of smaller factors.
      - declaration: LeanPool.DemazureProduct.Reduction.reduce
        informal: Reduces inequalities against a Demazure product to ordinary products of Bruhat-smaller factors with fixed shift.
      - declaration: LeanPool.DemazureProduct.Reduction.lres_stingy
        informal: Gives the stingy characterization of the left residual as a Bruhat-minimum of ordinary products.
      - declaration: LeanPool.DemazureProduct.ReducedProducts.star_eq_mul_iff_reducedProduct
        informal: Shows that the Demazure product equals ordinary multiplication exactly for reduced ASP products.
      - declaration: LeanPool.DemazureProduct.Transpositions.starSigma
        informal: Proves the adjacent-transposition formula for multiplying an ASP permutation by a no-consecutive-pair involution.
      - declaration: LeanPool.DemazureProduct.ASP321a.dprod_eq_iff
        informal: Characterizes Demazure factorizations of 321-avoiding ASP permutations by isolated inversion-set decompositions.
      - declaration: LeanPool.DemazureProduct.Tableaux.setValuedTableauEquivHeckeFactorization
        informal: Relates fixed-shift set-valued tableaux to Hecke factorizations of 321-avoiding ASP permutations.
    tags:
      - algebraic-combinatorics
      - demazure-product
      - bruhat-order
      - permutations
    msc:
      - "05E05"
      - "20F55"
