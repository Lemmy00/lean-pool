  - slug: pebbling-hypercube
    title: Optimal Pebbling Number of the Hypercube
    summary: >-
      Formalizes that the optimal pebbling number of the n-dimensional hypercube
      Q_n is Theta((4/3)^n).  Builds a weight-function lower bound of (4/3)^n and
      a probabilistic recursive upper bound C * (4/3)^n with an explicit constant,
      combining them into a two-sided big-Theta witness.
    branch: combinatorics
    entry_module: LeanPool.PebblingLean
    authors:
      - Lior Pachter
    source:
      title: "Optimal pebbling number of the hypercube"
      authors:
        - Lior Pachter
      url: "https://github.com/pachterlab/P_2026_2"
      github_repo: pachterlab/P_2026_2
    license: Apache-2.0
    status: verified
    main_declarations:
      - PebblingLean.Hypercube.Paper.optimalPebblingNumber_theta
    main_results:
      - declaration: PebblingLean.Hypercube.Paper.optimalPebblingNumber_theta
        informal: >-
          The optimal pebbling number of Q_n has order (4/3)^n: there is a positive
          constant C with (4/3)^n <= o(Q_n) <= C * (4/3)^n for all n.
      - declaration: PebblingLean.Hypercube.Paper.lower_bound
        informal: >-
          The optimal pebbling number of Q_n is at least (4/3)^n, proved by a
          weight-function argument summing one-pebble weights over the cube.
      - declaration: PebblingLean.Hypercube.Paper.upper_bound
        informal: >-
          The optimal pebbling number of Q_n is at most C * (4/3)^n for an explicit
          constant C, via a probabilistic recursive splitting construction.
    tags:
      - combinatorics
      - pebbling
      - hypercube
    msc:
      - "05C57"
  - slug: krafftsieve
    title: "A Conditional Sieve Criterion for Twin Primes via Krafft Geometry"
    summary: Introduces an original conditional sieve criterion for the Twin Prime Conjecture. Using a centered modular alignment (termed the Krafft alignment), proves that if the Rayleigh-Ritz quotient over the orthogonal unit sphere satisfies muMin < 1, then a twin prime pair must exist in the corresponding interval.
    branch: analytic number theory
    entry_module: LeanPool.KrafftSieve
    authors:
      - Fernando Portela
    source:
      doi: "10.5281/zenodo.19763833"
      github_repo: ElNando888/KrafftSieve
    license: Apache-2.0
    status: verified
    main_declarations:
      - KrafftSieve.mu_min_lt_one_implies_tpc
    main_results:
      - declaration: KrafftSieve.krafft_sieve_guarantee_with_mu_min
        informal: Proves that muMin n < 1 is a sufficient condition for the existence of a twin prime pair in the corresponding interval.
      - declaration: KrafftSieve.mu_min_lt_one_implies_tpc
        informal: If there are infinitely many intervals where the optimal multidimensional weight achieves a ratio strictly less than 1, then there are infinitely many twin primes. This is a conditional reduction; the hypothesis muMin n < 1 is not established here for any n.
    tags:
      - analytic-number-theory
      - sieve-theory
      - twin-primes
      - optimization
    msc:
      - "11N05"
      - "11N35"
  - slug: agree-to-disagree
    title: "Aumann's Agreement Theorem"
    summary: >-
      Formalizes Aumann's agreement theorem for information partitions and a
      common-prior setting, together with a p-belief variant bounding posterior
      disagreement by 2 * (1 - p).
    branch: probability theory
    entry_module: LeanPool.AgreeToDisagree
    authors:
      - Ruiz Chen
      - Ben Eltschig
      - Ken Ono
      - Jujian Zhang
    source:
      title: "We Can't Agree to Disagree, Formally: Aumann's Theorem and Assumption Accounting in Lean"
      url: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6837298"
      github_repo: AxiomMath/AgreeToDisagree
    license: MIT
    status: verified
    main_declarations:
      - AgreeToDisagree.agreeToDisagree
      - AgreeToDisagree.agreeToDisagree_beliefs
    main_results:
      - declaration: AgreeToDisagree.agreeToDisagree
        informal: >-
          If it is common knowledge at a state that two agents assign fixed
          posterior probabilities to an event, and the common-knowledge cell has
          equal posterior under their priors, then the two posterior
          probabilities are equal.
      - declaration: AgreeToDisagree.agreeToDisagree'
        informal: >-
          Generalizes the agreement theorem to a family of agents indexed by an
          arbitrary type.
      - declaration: AgreeToDisagree.agreeToDisagree_beliefs
        informal: >-
          Proves that common p-belief of fixed posteriors bounds the difference
          between any two agents' real-valued posteriors by 2 * (1 - p).
    tags:
      - probability
      - game-theory
      - epistemic-logic
    msc:
