      github_repo: Parcly-Taxel/Redhill
    status: verified
    main_declarations:
      - not_ramaekersConjecture_ge_six
      - le_quality_nConjectureTuples
    main_results:
      - declaration: RamaekersConjecture
        informal: Defines Ramaekers's conjecture for fixed n as the statement that the quality of the relevant tuple set equals 1.
      - declaration: not_ramaekersConjecture_ge_six
        informal: Proves Ramaekers's conjecture fails for every n at least 6 (the general case, Theorem 1.14).
      - declaration: not_ramaekersConjecture_odd_ge_five
        informal: Proves Ramaekers's conjecture fails for every odd n at least 5 (the odd case via Pell equations, Theorem 1.13).
      - declaration: not_ramaekersConjecture_five
        informal: Proves Ramaekers's conjecture fails for n equal to 5 (the Konyagin prelude bound).
      - declaration: le_quality_nConjectureTuples
        informal: Proves the Browkin-Brzezinski 1994 lower bound 2n-5 on the quality of the n-conjecture tuples (Theorem 1.3).
