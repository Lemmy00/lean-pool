  - slug: brouwer
    title: Existence of Nash equilibria via Brouwer's fixed-point theorem
    summary: Formalizes Scarf's combinatorial lemma, derives Brouwer's fixed-point theorem on a simplex and on finite products of simplices, and uses it to prove the existence of a mixed Nash equilibrium in every finite game.
    branch: game theory
    entry_module: LeanPool.Brouwer
    authors:
      - Math_XMUM
    source:
      doi: "10.1073/pnas.36.1.48"
      url: "https://github.com/math-xmum/Brouwer"
      github_repo: math-xmum/Brouwer
