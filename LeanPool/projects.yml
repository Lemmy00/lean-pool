  - slug: redhill
    title: Improved Lower Bounds for Strong n-Conjectures
    summary: Formalizes the disproof of Ramaekers's conjecture, constructing tuple families whose abc-style quality stays bounded above 1, and proves Browkin-Brzezinski lower bounds on the quality of the n-conjecture tuples.
    branch: number theory
    entry_module: LeanPool.Redhill
